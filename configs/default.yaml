# TinyMind default configuration
# Teacher: deepseek-ai/DeepSeek-R1
# Student: Qwen/Qwen3-4B

distillation:
  teacher_model: "deepseek-ai/DeepSeek-R1"
  student_model: "Qwen/Qwen3-4B"
  temperature: 2.0
  alpha: 0.5                  # weight: KD loss vs task loss

reason_distill:
  enabled: true
  cot_injection_layer: -1     # inject CoT signals at final layer
  reasoning_weight: 0.3

training:
  epochs: 3
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  warmup_steps: 100
  fp16: true
  output_dir: "checkpoints/"

export:
  backend: "phone_llm"        # phone_llm | onnx | coreml
  quantization: "Q4_K_M"     # Q4_K_M | Q8_0 | int4 | int8 | fp16
  target_device: "android"    # android | ios | generic

benchmarks:
  datasets: ["mmlu", "hellaswag", "arc_challenge"]
  max_samples: 1000
